<svg viewBox="0 0 720 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MASFRAME - Sistema Clínico de Intervención Empresarial">
  <defs>
    <linearGradient id="gld" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8A84B"/>
      <stop offset="50%" stop-color="#E8C96A"/>
      <stop offset="100%" stop-color="#B89D52"/>
    </linearGradient>
    <linearGradient id="nvy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3060"/>
      <stop offset="100%" stop-color="#0F1A35"/>
    </linearGradient>
    <pattern id="geo" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <line x1="0" y1="9" x2="18" y2="9" stroke="#B89D52" stroke-width="0.25" opacity="0.15"/>
      <line x1="9" y1="0" x2="9" y2="18" stroke="#B89D52" stroke-width="0.25" opacity="0.15"/>
    </pattern>
  </defs>
  <!-- Fondo navy -->
  <rect width="720" height="160" fill="#0F1A35" rx="14"/>
  <rect width="720" height="160" fill="url(#geo)" rx="14"/>
  <!-- Franja dorada top -->
  <rect x="0" y="0" width="720" height="2.5" fill="url(#gld)" rx="2"/>
  <!-- Hexágono símbolo -->
  <g transform="translate(28,40)">
    <polygon points="52,0 88,0 106,31 88,62 52,62 34,31" fill="none" stroke="url(#gld)" stroke-width="1.4" opacity=".9"/>
    <polygon points="54,9 82,9 96,31 82,53 54,53 40,31" fill="none" stroke="url(#gld)" stroke-width=".5" opacity=".28"/>
    <text x="70" y="44" font-family="Georgia,serif" font-size="28" font-weight="700" fill="#F9F7F2" text-anchor="middle">M</text>
    <!-- Líneas dinámicas -->
    <line x1="97" y1="12" x2="118" y2="46" stroke="url(#gld)" stroke-width="1.1" opacity=".45"/>
    <line x1="104" y1="6" x2="123" y2="38" stroke="url(#gld)" stroke-width=".5" opacity=".2"/>
  </g>
  <!-- Wordmark -->
  <g transform="translate(164,44)">
    <text x="0" y="52" font-family="'Cormorant Garamond',Georgia,serif" font-size="46" font-weight="700" fill="#F9F7F2" letter-spacing="4">MASFRAME</text>
    <rect x="0" y="62" width="510" height="1" fill="url(#gld)" opacity=".55"/>
    <text x="0" y="82" font-family="'Cormorant Garamond',Georgia,serif" font-size="11" fill="#B89D52" letter-spacing="4.5">SISTEMA CLÍNICO DE INTERVENCIÓN EMPRESARIAL</text>
  </g>
  <!-- Acento dinámico esquina -->
  <line x1="650" y1="128" x2="704" y2="150" stroke="url(#gld)" stroke-width=".9" opacity=".25"/>
  <line x1="660" y1="122" x2="710" y2="142" stroke="url(#gld)" stroke-width=".4" opacity=".12"/>
</svg>
